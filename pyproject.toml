[project]
name = "abridge"
version = "0.1.0"
description = "Bridge Agentix agent rollouts into RL training frameworks"
requires-python = ">=3.11"
dependencies = [
    # Source: Agentix runtime exposes trace events over Socket.IO; we
    # consume them via the same RuntimeClient the orchestrator uses, so
    # the framework is a hard dep here (not a peer).
    "agentix>=0.1.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
    "pyright>=1.1.380",
]

[project.scripts]
# `abridge tap http://runtime --writer jsonl --out rollouts.jsonl`
abridge = "abridge.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["abridge"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]

[tool.pyright]
include = ["abridge", "tests"]
exclude = ["**/__pycache__", ".venv"]
typeCheckingMode = "basic"
pythonVersion = "3.11"

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["."]
python_files = ["test_*.py"]
